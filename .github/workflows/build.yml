name: Build node binaries
# Public CI (FREE unlimited minutes) that builds the Bull4Life node binaries for Windows x64, Linux x86-64
# AND Linux arm64 — ALL donor platforms in one run. This is the ONLY place node binaries are built: it keeps
# the build off Daniel's laptop/wifi AND out of the private engine repo (which BILLS Actions minutes), and it
# does NOT touch the donor-node fleet's free minutes (they run on the separate public bull4life-donate repo).
# This repo holds ONLY this workflow — no strategy source. The private engine source is cloned READ-ONLY into
# the ephemeral runner via a fine-grained token secret, compiled, and discarded. Nothing sensitive is ever
# committed here or printed to logs. All steps run in bash (Git Bash on the Windows runner) so the matrix
# shares one set of steps.
on:
  workflow_dispatch:
jobs:
  build:
    name: build-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest     # Windows x64 donors (built here, never on Daniel's laptop)
            arch: windows-x64
            out: b4l_node-windows.exe
          - runner: ubuntu-22.04
            arch: x86-64
            out: b4l_node-linux
          - runner: ubuntu-22.04-arm
            arch: arm64
            out: b4l_node-linux-arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    defaults:
      run:
        shell: bash                    # Git Bash on windows-latest -> one set of steps works on all 3 runners
    steps:
      - name: Clone private engine source (read-only token, never logged)
        run: |
          git clone --depth 1 "https://x-access-token:${{ secrets.ENGINE_TOKEN }}@github.com/Bull4Life/bull4life-engine.git" engine 2>/dev/null
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build deps
        run: pip install nuitka zstandard numpy pandas psutil cryptography certifi
      - name: Build (Nuitka onefile)
        working-directory: engine
        run: python compute/build_node.py
      - name: Locate binary
        working-directory: engine
        run: |
          set +o pipefail   # `shell: bash` enables pipefail; `grep … | head -n1` SIGPIPEs grep -> false failure
          f=$(ls -1 dist/b4l_node* 2>/dev/null | grep -Ev '\.(zip|dist)$' | head -n1)
          if [ -z "$f" ]; then echo "no binary"; ls -la dist || true; exit 1; fi
          cp "$f" "../${{ matrix.out }}"; chmod +x "../${{ matrix.out }}"
          echo "size: $(du -h ../${{ matrix.out }} | cut -f1)"
      - name: Smoke test — binary must boot + import its full job chain (NEVER publish a broken build)
        working-directory: engine
        run: |
          rm -f bootok
          echo "running --verify-boot (deepened: imports sweep_runner/sweep_core/engines/hunter_hooks) on ${{ matrix.arch }} …"
          B4L_BOOTOK_MARKER=bootok "../${{ matrix.out }}" --verify-boot || true   # self-exits; no timeout needed
          if [ ! -f bootok ]; then
            echo "SMOKE FAILED: --verify-boot wrote no boot-ok marker -> a job-chain import is broken"
            echo "(the matplotlib / verify_env / missing-hidden-import class). This build is NOT published."
            exit 1
          fi
          echo "smoke OK: binary boots and the full job chain imports"
      - name: Publish binary to coordinator (cloud-to-cloud) + emit hash
        working-directory: engine
        env:
          DRAIN_TOKEN: ${{ secrets.DRAIN_TOKEN }}
        run: |
          set +o pipefail
          COORD="https://compute.bull4life.com"
          VER=$(grep -oE "VERSION = '[0-9][0-9.]*'" compute/node.py | head -1 | grep -oE "[0-9][0-9.]*" | head -1)
          BIN="../${{ matrix.out }}"
          SHA=$(sha256sum "$BIN" | cut -d' ' -f1)
          SIZE=$(wc -c < "$BIN" | tr -d ' ')
          case "${{ matrix.arch }}" in
            x86-64)      NAME="b4l_node-${VER}.exe"; FATAL=1 ;;   # the /version default url -> Linux fleet auto-updates
            arm64)       NAME="b4l_node-${VER}-arm64"; FATAL=0 ;;
            windows-x64) NAME="b4l_node-${VER}-windows.exe"; FATAL=0 ;;
          esac
          echo "v$VER ${{ matrix.arch }} sha ${SHA:0:16} size $((SIZE/1048576))MB -> $COORD/release/$NAME"
          code=$(curl -sS -o /dev/null -w '%{http_code}' -X POST -H "X-B4L-Token: $DRAIN_TOKEN" \
                 -H "Content-Type: application/octet-stream" --data-binary @"$BIN" "$COORD/release/$NAME")
          echo "  upload HTTP $code"
          if [ "$code" != "200" ] && [ "$FATAL" = "1" ]; then echo "x86 upload FAILED (fatal)"; exit 1; fi
          mkdir -p ../meta
          printf '%s %s %s %s\n' "$VER" "$SHA" "$SIZE" "$NAME" > "../meta/sha-${{ matrix.arch }}.txt"
          cat "../meta/sha-${{ matrix.arch }}.txt"
      - name: Upload hash artifact (tiny — the laptop reads this to sign, never the binary)
        uses: actions/upload-artifact@v4
        with:
          name: sha-${{ matrix.arch }}
          path: meta/sha-${{ matrix.arch }}.txt
          retention-days: 2
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: ${{ matrix.out }}
          retention-days: 2
